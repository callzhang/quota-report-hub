name: Probe Auth Pool

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

# Never let two probe runs overlap: each run snapshots the pool at start and centrally
# refreshes tokens, so two concurrent runs can replay an already-rotated refresh token and
# get the whole token family revoked by the provider. A fixed concurrency group serializes
# runs; cancel-in-progress:false lets the active run finish (never kill a refresh mid-flight)
# and queues the next one to start on a fresh snapshot.
concurrency:
  group: probe-auth-pool
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install app dependencies
        run: npm ci
      - name: Install Codex CLI
        run: npm install -g @openai/codex
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Install Python dependencies
        run: python3 -m pip install --user pexpect
      - name: Run cloud auth pool probe worker
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          AUTH_POOL_ENCRYPTION_KEY: ${{ secrets.AUTH_POOL_ENCRYPTION_KEY }}
          TIGRIS_STORAGE_ACCESS_KEY_ID: ${{ secrets.TIGRIS_STORAGE_ACCESS_KEY_ID }}
          TIGRIS_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_STORAGE_SECRET_ACCESS_KEY }}
          TIGRIS_STORAGE_BUCKET: ${{ secrets.TIGRIS_STORAGE_BUCKET }}
        run: node scripts/probe_auth_pool_worker.mjs
